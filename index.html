<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف S & A - قاعة مسرة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <section class="hero-envelope">
        <div class="envelope-wrapper">
            <div class="envelope" id="envelope">
                <div class="wax-seal" onclick="openInvitation()">
                    <span class="initials">S & A</span>
                </div>
            </div>
            <p class="tap-hint">اضغطي على الختم لفتح الدعوة</p>
        </div>
    </section>

    <div id="main-content" class="hidden">
        <section class="invitation-card">
            <h1 class="names">S & A</h1>
            <div class="divider">✦</div>
            <p class="welcome-text">بكل الحب والتقدير نتشرف بدعوتكم لحضور حفل زفافنا في</p>
            <h2 class="location-name">قاعة مسرة</h2>
            <p class="attendance-time">وقت الحضور: **8:00 مساءً**</p>
            <p class="date">**18 أبريل 2026**</p>
            
            <div class="countdown">
                <div class="time-unit"><span id="days">00</span> يوم</div>
                <div class="time-unit"><span id="hours">00</span> ساعة</div>
            </div>

            <div class="rsvp-section">
                <h3>تأكيد الحضور (RSVP)</h3>
                <form id="rsvp-form" action="https://sheetdb.io/api/v1/7f3h8k9l0m1n2" method="POST">
                    <input type="text" name="data[Name]" placeholder="الاسم الكامل" required>
                    <input type="number" name="data[Guests]" placeholder="عدد المرافقين" min="0">
                    <button type="submit" class="btn-submit">تأكيد الحضور الآن</button>
                </form>
                <p id="success-msg" class="hidden">تم استلام تأكيدك بنجاح، ننتظرك بكل حب!</p>
            </div>
        </section>
    </div>

    <script>
        // وظيفة فتح المغلف
        function openInvitation() {
            document.getElementById('envelope').classList.add('open');
            setTimeout(() => {
                document.getElementById('main-content').classList.remove('hidden');
                window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
            }, 1000);
        }

        // تحديث العداد التنازلي لتاريخ 18 أبريل 2026 الساعة 8 مساءً
        const weddingDate = new Date("April 18, 2026 20:00:00").getTime();
        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;

            if (distance < 0) {
                clearInterval(timer);
                document.querySelector(".countdown").innerHTML = "نورتمونا!";
            }
        }, 1000);

        // منع الصفحة من الانتقال بعد الضغط على الزر لإظهار رسالة نجاح
        const form = document.getElementById('rsvp-form');
        form.addEventListener("submit", e => {
            e.preventDefault();
            fetch(form.action, {
                method : "POST",
                body: new FormData(document.getElementById("rsvp-form")),
            }).then(
                response => response.json()
            ).then((html) => {
                document.getElementById('success-msg').classList.remove('hidden');
                form.reset();
            });
        });
    </script>
</body>
</html>
