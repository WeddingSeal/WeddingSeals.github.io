<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف S & A</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper" id="envelope-wrapper" onclick="openInvitation()">
            <div class="envelope-back"></div>
            
            <div class="letter" id="letter">
                <div class="inner-card">
                    <h1 class="names">S & A</h1>
                    <p class="welcome-text">نتشرف بدعوتكم لمشاركتنا أجمل لحظات العمر.</p>
                    <h2 class="location-name">قاعة مسرة</h2>
                    <p class="info">وقت الحضور: 8:00 مساءً</p>
                    <p class="info">18 أبريل 2026</p>
                    
                    <div class="countdown">
                        <div class="unit"><span id="days">00</span> يوم</div>
                        <div class="unit"><span id="hours">00</span> ساعة</div>
                    </div>

                    <div class="rsvp-box">
                        <h3>تأكيد الحضور</h3>
                        <form action="https://formspree.io/f/mgoprjdv" method="POST">
                            <input type="text" name="الاسم" placeholder="الاسم الكامل" required>
                            <input type="number" name="المرافقين" placeholder="عدد المرافقين">
                            <button type="submit" class="btn">تأكيد الآن</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="envelope-front"></div>
            
            <div class="envelope-top"></div>
            
            <div class="wax-seal">
                <span class="initials">S & A</span>
            </div>
        </div>
        <p class="hint" id="hint">اضغطي على الختم لفتح الدعوة</p>
    </div>

    <script>
        function openInvitation() {
            document.getElementById('envelope-wrapper').classList.add('open');
            document.getElementById('hint').style.opacity = '0';
        }

        const weddingDate = new Date("April 18, 2026 20:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerHTML = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        }, 1000);
    </script>
</body>
</html>
