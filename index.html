<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف S & A - قاعة مسرة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="wrapper">
        <div class="envelope-wrapper" id="envelope-wrapper" onclick="openInvitation()">
            <div class="envelope">
                <div class="wax-seal">
                    <span class="initials">S & A</span>
                </div>
            </div>
            <div class="letter" id="letter">
                <section class="invitation-card">
                    <h1 class="names">S & A</h1>
                    <div class="divider">✦</div>
                    <p class="welcome-text">بكل الحب والتقدير، نتشرف بدعوتكم لمشاركتنا أجمل لحظات العمر.</p>
                    <h2 class="location-name">قاعة مسرة</h2>
                    <p class="attendance-time">وقت الحضور: 8:00 مساءً</p>
                    <p class="date">18 أبريل 2026</p>
                    
                    <div class="countdown">
                        <div class="time-unit"><span id="days">00</span> يوم</div>
                        <div class="time-unit"><span id="hours">00</span> ساعة</div>
                    </div>

                    <div class="rsvp-section">
                        <h3>تأكيد الحضور (RSVP)</h3>
                        <form id="rsvp-form" action="https://formspree.io/f/mgoprjdv" method="POST">
                            <input type="text" name="الاسم" placeholder="الاسم الكامل" required>
                            <input type="number" name="المرافقين" placeholder="عدد المرافقين" min="0">
                            <button type="submit" id="submit-btn" class="btn-submit">تأكيد الحضور الآن</button>
                        </form>
                        <p id="success-msg" style="display:none; color: #b78472; margin-top: 15px; font-weight: bold;">تم استلام تأكيدك بنجاح!</p>
                    </div>
                </section>
            </div>
        </div>
        <p class="tap-hint" id="hint">اضغطي على الختم لسحب الدعوة</p>
    </div>

    <script>
        function openInvitation() {
            document.getElementById('envelope-wrapper').classList.add('open');
            document.getElementById('hint').style.opacity = '0';
        }

        // عداد الوقت
        const weddingDate = new Date("April 18, 2026 20:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerHTML = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        }, 1000);

        // إرسال Formspree
        const form = document.getElementById('rsvp-form');
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "جاري الإرسال...";
            const response = await fetch(form.action, {
                method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' }
            });
            if (response.ok) {
                document.getElementById('success-msg').style.display = 'block';
                form.style.display = 'none';
            }
        });
    </script>
</body>
</html>
